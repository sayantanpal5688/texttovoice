<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>textTOvoice — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:  #970747;
    --pink2: #c0095c;
    --pink3: #ff2d78;
    --white: #ffffff;
    --muted: #aaaaaa;
    --border:rgba(151,7,71,0.3);
    --glass: rgba(10,5,8,0.75);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:#0a0208;
    color:var(--white);
    font-family:'Space Grotesk',sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

  .top-bar {
    width:100%; height:4px; position:relative; z-index:2;
    background:linear-gradient(90deg,#970747,#ff2d78,#c0095c,#ff2d78,#970747);
    background-size:300% 100%;
    animation:shimmer 3s linear infinite;
  }
  @keyframes shimmer{0%{background-position:300% 0}100%{background-position:-300% 0}}

  .wrap {
    flex:1; display:flex; align-items:center; justify-content:center;
    position:relative; z-index:1; padding:2rem;
  }

  .card {
    background:var(--glass);
    backdrop-filter:blur(24px);
    border:1px solid var(--border);
    border-radius:24px;
    padding:2.5rem 2rem;
    width:100%; max-width:400px;
    box-shadow:0 0 60px rgba(151,7,71,0.2);
  }

  .logo { text-align:center; margin-bottom:2rem; }
  .logo-icon {
    width:52px; height:52px;
    background:var(--pink);
    border-radius:14px;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:26px; margin-bottom:12px;
    box-shadow:0 0 24px rgba(151,7,71,0.7);
  }
  .logo-mark {
    font-family:'Space Mono',monospace;
    font-size:24px; font-weight:700;
    color:var(--white); letter-spacing:-1px;
  }
  .logo-mark span { color:var(--pink3); }
  .logo-sub { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:2px; margin-top:4px; }

  /* tabs */
  .tabs { display:flex; background:rgba(255,255,255,0.04); border-radius:12px; padding:4px; margin-bottom:1.8rem; }
  .tab {
    flex:1; padding:8px; text-align:center;
    font-size:14px; font-weight:600; color:var(--muted);
    border-radius:9px; cursor:pointer; transition:all 0.2s; border:none; background:transparent;
  }
  .tab.active { background:var(--pink); color:var(--white); box-shadow:0 0 14px rgba(151,7,71,0.5); }

  /* forms */
  .form-group { margin-bottom:1rem; }
  label { display:block; font-size:11px; font-weight:600; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; font-family:'Space Mono',monospace; }
  input[type=text],input[type=password] {
    width:100%; padding:12px 16px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:12px; color:var(--white);
    font-family:'Space Grotesk',sans-serif; font-size:15px;
    outline:none; transition:all 0.2s;
  }
  input:focus { border-color:var(--pink3); box-shadow:0 0 0 3px rgba(255,45,120,0.15); }
  input::placeholder { color:rgba(255,255,255,0.2); }

  .submit-btn {
    width:100%; padding:14px;
    background:linear-gradient(135deg,var(--pink),var(--pink2));
    color:var(--white);
    font-family:'Space Grotesk',sans-serif;
    font-size:16px; font-weight:700; letter-spacing:0.5px;
    border:none; border-radius:12px; cursor:pointer;
    transition:all 0.15s; margin-top:0.5rem;
    box-shadow:0 4px 28px rgba(151,7,71,0.5);
  }
  .submit-btn:hover { box-shadow:0 6px 36px rgba(151,7,71,0.7); transform:translateY(-1px); }
  .submit-btn:active { transform:scale(0.98); }
  .submit-btn:disabled { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.3); cursor:not-allowed; box-shadow:none; transform:none; }

  .error-msg {
    display:none; background:rgba(180,0,0,0.15);
    border:1px solid #ff4d6d; border-radius:10px;
    padding:10px 14px; margin-top:12px;
    font-size:13px; color:#ff4d6d;
    font-family:'Space Mono',monospace;
  }
  .error-msg.show { display:block; }

  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin{to{transform:rotate(360deg)}}

  footer { text-align:center; padding:16px; font-family:'Space Mono',monospace; font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:2px; position:relative; z-index:1; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="top-bar"></div>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎙</div><br>
      <div class="logo-mark">text<span>TO</span>voice</div>
      <div class="logo-sub">AI POWERED VOICES</div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div class="form-group">
        <label>Email or Phone</label>
        <input type="text" id="l-user" placeholder="email@example.com or 9876543210" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="submit-btn" id="login-btn" onclick="doLogin()">Sign In</button>
      <div class="error-msg" id="login-err"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Email or Phone Number</label>
        <input type="text" id="r-user" placeholder="email@example.com or 9876543210" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Choose Password</label>
        <input type="password" id="r-pass" placeholder="min. 4 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="submit-btn" id="register-btn" onclick="doRegister()">Create Account — 10 Free Uses</button>
      <div class="error-msg" id="register-err"></div>
    </div>
  </div>
</div>

<footer>textTOvoice · AI POWERED VOICES</footer>

<script>
// ── BACKGROUND ──
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H,pts=[],mouse={x:0,y:0};
  const COLS=['rgba(151,7,71,','rgba(192,9,92,','rgba(255,45,120,'];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  class P{constructor(){this.reset(true);}reset(i){this.x=Math.random()*W;this.y=i?Math.random()*H:H+10;this.r=Math.random()*2.5+0.5;this.sy=-(Math.random()*0.4+0.1);this.sx=(Math.random()-.5)*0.3;this.a=Math.random()*0.4+0.1;this.col=COLS[Math.floor(Math.random()*3)];this.p=Math.random()*Math.PI*2;}update(){this.p+=0.02;this.y+=this.sy;this.x+=this.sx;const dx=mouse.x-this.x,dy=mouse.y-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<140){this.x+=dx*.003;this.y+=dy*.003;}if(this.y<-10)this.reset(false);}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.col+(this.a*(0.7+0.3*Math.sin(this.p)))+')';ctx.fill();}}
  const orbs=[{x:.2,y:.3,r:260,col:'rgba(151,7,71,0.1)'},{x:.8,y:.7,r:220,col:'rgba(192,9,92,0.08)'},{x:.5,y:.5,r:180,col:'rgba(255,45,120,0.06)'}];
  let t=0;
  for(let i=0;i<90;i++)pts.push(new P());
  function frame(){ctx.clearRect(0,0,W,H);t+=.005;
    orbs.forEach(o=>{const ox=(o.x+Math.sin(t*.3)*.08)*W,oy=(o.y+Math.cos(t*.2)*.06)*H,g=ctx.createRadialGradient(ox,oy,0,ox,oy,o.r);g.addColorStop(0,o.col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});
    pts.forEach(p=>{p.update();p.draw();});
    requestAnimationFrame(frame);}
  frame();
})();

// ── AUTH ──
function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-register').style.display=tab==='register'?'block':'none';
}

function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.classList.add('show');}
function hideErr(id){document.getElementById(id).classList.remove('show');}

async function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  if(!u||!p){showErr('login-err','Enter email/phone and password.');return;}
  hideErr('login-err');
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Signing in…';
  try{
    const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({username:u,password:p})});
    const data=await res.json();
    if(!res.ok){showErr('login-err',data.error||'Login failed.');btn.disabled=false;btn.textContent='Sign In';return;}
    window.location.href='/';
  }catch{showErr('login-err','Connection error. Is app running?');btn.disabled=false;btn.textContent='Sign In';}
}

function isValidEmailOrPhone(s){
  // Email check (simple but effective)
  const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  // Phone: 10-digit Indian mobile, optionally with +91 / 0 prefix
  const phoneRx = /^(\+91[- ]?|0)?[6-9]\d{9}$/;
  return emailRx.test(s) || phoneRx.test(s.replace(/[\s-]/g,''));
}

async function doRegister(){
  const u=document.getElementById('r-user').value.trim();
  const p=document.getElementById('r-pass').value;
  if(!u||!p){showErr('register-err','Fill in both fields.');return;}
  if(!isValidEmailOrPhone(u)){
    showErr('register-err','Please enter a valid email or 10-digit Indian phone number.');
    return;
  }
  if(p.length<4){showErr('register-err','Password must be at least 4 characters.');return;}
  hideErr('register-err');
  const btn=document.getElementById('register-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Creating account…';
  try{
    const res=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({username:u,password:p})});
    const data=await res.json();
    if(!res.ok){showErr('register-err',data.error||'Registration failed.');btn.disabled=false;btn.textContent='Create Account — 10 Free Uses';return;}
    window.location.href='/';
  }catch{showErr('register-err','Connection error. Is app running?');btn.disabled=false;btn.textContent='Create Account — 10 Free Uses';}
}
</script>
</body>
</html>
